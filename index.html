<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast | Smart Weather Planner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div class="search-box">
            <input type="text" id="city-input" placeholder="Enter city name...">
            <button id="search-btn">Check Weather</button>
        </div>

        <div class="weather-display" id="weather-info" style="display: none;">
            <h2 id="city-name">London</h2>
            <h1 id="temp">25°C</h1>
            <p id="description">Cloudy</p>
            
            <div class="recommendation-card">
                <h3>💡 Activity Suggestion:</h3>
                <p id="suggestion">Loading advice...</p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
